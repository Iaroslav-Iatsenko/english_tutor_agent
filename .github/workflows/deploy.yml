name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f Dockerfile.backend -t $ECR_REGISTRY/english-tutor-backend:latest .
          docker push $ECR_REGISTRY/english-tutor-backend:latest

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f Dockerfile.frontend -t $ECR_REGISTRY/english-tutor-frontend:latest .
          docker push $ECR_REGISTRY/english-tutor-frontend:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster english-tutor \
            --service english-tutor-service \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}

      - name: Wait for deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster english-tutor \
            --services english-tutor-service \
            --region ${{ secrets.AWS_REGION }}
          echo "Deployment complete."
